name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck (Expo app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  database:
    name: Migrations + seed + smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create Supabase-like roles + auth.uid() shim
        run: |
          psql -v ON_ERROR_STOP=1 -c "create role authenticated;"
          psql -v ON_ERROR_STOP=1 -c "create role anon;"
          psql -v ON_ERROR_STOP=1 -c "create schema if not exists auth;"
          psql -v ON_ERROR_STOP=1 -c "create or replace function auth.uid() returns uuid language sql stable as \$\$ select nullif(current_setting('request.jwt.claim.sub', true), '')::uuid \$\$;"

      - name: Apply migrations (in filename order)
        run: |
          for f in supabase/migrations/*.sql; do
            echo "── applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Load seed data
        run: psql -v ON_ERROR_STOP=1 -f supabase/seed.sql

      - name: Smoke assertions
        run: psql -v ON_ERROR_STOP=1 -f .github/ci/smoke.sql
